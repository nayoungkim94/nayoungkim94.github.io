<script src="{{ base_path }}/assets/js/main.min.js"></script>

<script>
(function() {
  // ---------- Theme toggle ----------
  function initThemeToggle() {
    var btn = document.getElementById('theme-toggle');
    if (!btn) return;

    function render() {
      var cur = document.documentElement.getAttribute('data-theme') || 'light';
      btn.innerHTML = cur === 'dark' ? '☀' : '☾';
      btn.setAttribute('aria-label', 'Switch to ' + (cur === 'dark' ? 'light' : 'dark') + ' mode');
    }

    render();
    btn.addEventListener('click', function() {
      var cur = document.documentElement.getAttribute('data-theme') || 'light';
      var next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem('theme', next); } catch (e) {}
      render();
    });
  }

  // ---------- Scroll fade-in ----------
  function initFadeIn() {
    if (!('IntersectionObserver' in window)) return;

    var selector = '.page__content > h1, .page__content > h2, .page__content > h3, .page__content > p, .page__content > ul, .page__content > ol, .page__content > .skills, .page__content > .open-to, .page__content > .timeline, .page__content > a.btn, .page__content > div';
    var targets = document.querySelectorAll(selector);

    Array.prototype.forEach.call(targets, function(el) {
      el.classList.add('fade-in-up');
    });

    var io = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });

    Array.prototype.forEach.call(targets, function(el) { io.observe(el); });
  }

  // ---------- Tab title animation ----------
  function initTitleSwap() {
    var originalTitle = document.title;
    var awayTitle = '👋 Come back!';
    document.addEventListener('visibilitychange', function() {
      if (document.hidden) {
        document.title = awayTitle;
      } else {
        document.title = originalTitle;
      }
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() {
      initThemeToggle();
      initFadeIn();
      initTitleSwap();
    });
  } else {
    initThemeToggle();
    initFadeIn();
    initTitleSwap();
  }
})();
</script>
